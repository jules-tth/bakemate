name: CI Test Workflow
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: pytest --cov=app --cov-report=xml
    - name: Enforce coverage
      run: |
        TOTAL=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('coverage.xml'); print(int(float(tree.getroot().attrib['line-rate'])*100))")
        if [ "$TOTAL" -lt 80 ]; then
          echo "Coverage $TOTAL% below target"; exit 1
        fi

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend-next/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run tests
      run: npm test
