services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8300:8000"
    volumes:
      - ./backend:/app
      - ./backend/app_files:/app/app_files
    environment:
      - DATABASE_URL=sqlite:////app/app_files/bakemate_dev.db
      - APP_FILES_DIR=/app/app_files
      - SQLITE_DB_PATH=/app/app_files/bakemate_dev.db
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID}
      - AIRTABLE_API_KEY=${AIRTABLE_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-secret-key}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3300:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8301:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
